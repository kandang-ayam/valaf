{{define "head"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · valaf</title>
  <link rel="icon" href="/static/logo.svg">
  <script>
    /* set theme before paint to avoid a flash */
    (function () {
      try {
        var t = localStorage.getItem("valaf-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="bar">
      <a class="brand" href="/">
        <img src="/static/logo.svg" alt="">
        <span class="word">valaf</span><span class="tag">incident notebook</span>
      </a>
      <nav><a href="/">Incidents</a></nav>
      <span class="header-spacer"></span>
      {{if .User}}
        <div class="user-chip" title="{{.User.Role}}">
          <span class="uname">{{.User.Username}}</span>
          <span class="urole">{{.User.Role}}</span>
        </div>
        <form method="post" action="/logout" class="inline-form">
          <input type="hidden" name="csrf" value="{{.CSRF}}">
          <button class="theme-toggle" type="submit" title="Sign out" aria-label="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          </button>
        </form>
      {{end}}
      <button class="theme-toggle" type="button" onclick="valafToggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
  </header>
  <main>
{{end}}

{{define "foot"}}
  </main>
  <footer>valaf · self-hosted incident notebook</footer>
</body>
</html>
{{end}}
